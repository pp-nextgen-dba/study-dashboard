<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths Progress Tracker</title>

<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>📐 Maths Progress Tracker</h1>

        <a class="back-btn" href="../index.html">
            ← Back to Dashboard
        </a>
    </header>

    <section>

        <div class="summary-box">

            <div>
                <h3>Total Chapters</h3>
                <p id="totalChapters">0</p>
            </div>

            <div>
                <h3>Completed</h3>
                <p id="completedChapters">0</p>
            </div>

            <div>
                <h3>Completion</h3>
                <p id="completionPercent">0%</p>
            </div>

        </div>

    </section>

    <section>

        <table>

            <thead>
                <tr>
                    <th>Form</th>
                    <th>Chapter</th>
                    <th>Chinese</th>
                    <th>Status</th>
                    <th>Confidence</th>
                    <th>Last Updated</th>
                </tr>
            </thead>

            <tbody id="mathTableBody">
            </tbody>

        </table>

    </section>

</div>

<script type="module" src="../js/firebase.js"></script>
<script type="module" src="../js/addmaths.js"></script>

</body>
</html>
